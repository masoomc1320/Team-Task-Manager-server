server.port=${PORT:5000}
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/task_manager?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# HS256 needs >= 256 bits (32+ UTF-8 bytes). Override JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:dev-only-change-this-to-a-long-random-string-32bytes-min}
app.jwt.expiration-ms=604800000
app.client.url=${CLIENT_URL:http://localhost:4200}
